<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - SoleStyle</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <!-- Toast Container -->
    <div class="toast-container"></div>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">Sole<span>Style</span></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="products.html">Products</a></li>
                    <li class="nav-item"><a class="nav-link" href="reels.html">Reels</a></li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">Categories</a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="products.html?cat=men">Men</a></li>
                            <li><a class="dropdown-item" href="products.html?cat=women">Women</a></li>
                            <li><a class="dropdown-item" href="products.html?cat=kids">Kids</a></li>
                            <li><a class="dropdown-item" href="products.html?cat=sports">Sports</a></li>
                            <li><a class="dropdown-item" href="products.html?cat=casual">Casual</a></li>
                            <li><a class="dropdown-item" href="products.html?cat=formal">Formal</a></li>
                        </ul>
                    </li>
                </ul>
                <div class="d-flex align-items-center navbar-icons">
                    <a href="cart.html" class="btn"><i class="fas fa-shopping-cart"></i><span class="cart-badge">0</span></a>
                    <a href="#" class="btn"><i class="fas fa-user"></i></a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Breadcrumb -->
    <section class="breadcrumb-section">
        <div class="container">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb mb-0">
                    <li class="breadcrumb-item"><a href="index.html">Home</a></li>
                    <li class="breadcrumb-item active">Products</li>
                </ol>
            </nav>
        </div>
    </section>

    <!-- Products Section -->
    <section class="section-padding">
        <div class="container">
            <div class="row">
                <!-- Sidebar Filters -->
                <div class="col-lg-3 mb-4">
                    <div class="filter-sidebar">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h5 class="mb-0 fw-bold">Filters</h5>
                            <button class="btn btn-sm btn-outline-secondary">Clear All</button>
                        </div>

                        <!-- Category Filter -->
                        <div class="mb-4">
                            <h6>Category</h6>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="cat-men">
                                <label class="form-check-label" for="cat-men">Men</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="cat-women">
                                <label class="form-check-label" for="cat-women">Women</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="cat-kids">
                                <label class="form-check-label" for="cat-kids">Kids</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="cat-sports">
                                <label class="form-check-label" for="cat-sports">Sports</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="cat-casual">
                                <label class="form-check-label" for="cat-casual">Casual</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="cat-formal">
                                <label class="form-check-label" for="cat-formal">Formal</label>
                            </div>
                        </div>

                        <!-- Price Range -->
                        <div class="mb-4">
                            <h6>Price Range</h6>
                            <div class="price-range-slider">
                                <input type="range" class="form-range" min="0" max="500" value="250" id="priceRange">
                                <div class="d-flex justify-content-between">
                                    <small>$0</small>
                                    <small id="priceValue">$250</small>
                                    <small>$500</small>
                                </div>
                            </div>
                        </div>

                        <!-- Size Filter -->
                        <div class="mb-4">
                            <h6>Size</h6>
                            <div class="d-flex flex-wrap gap-2">
                                <button class="btn btn-sm btn-outline-secondary">6</button>
                                <button class="btn btn-sm btn-outline-secondary">7</button>
                                <button class="btn btn-sm btn-outline-secondary">8</button>
                                <button class="btn btn-sm btn-outline-secondary">9</button>
                                <button class="btn btn-sm btn-outline-secondary">10</button>
                                <button class="btn btn-sm btn-outline-secondary">11</button>
                                <button class="btn btn-sm btn-outline-secondary">12</button>
                            </div>
                        </div>

                        <!-- Brand Filter -->
                        <div class="mb-4">
                            <h6>Brand</h6>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="brand-nike">
                                <label class="form-check-label" for="brand-nike">Nike</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="brand-adidas">
                                <label class="form-check-label" for="brand-adidas">Adidas</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="brand-puma">
                                <label class="form-check-label" for="brand-puma">Puma</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="brand-nb">
                                <label class="form-check-label" for="brand-nb">New Balance</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="brand-clarks">
                                <label class="form-check-label" for="brand-clarks">Clarks</label>
                            </div>
                        </div>

                        <!-- Color Filter -->
                        <div class="mb-4">
                            <h6>Color</h6>
                            <div class="d-flex flex-wrap gap-2">
                                <button class="btn rounded-circle p-0" style="width:30px;height:30px;background:#000000;border:2px solid #ddd"></button>
                                <button class="btn rounded-circle p-0" style="width:30px;height:30px;background:#ffffff;border:2px solid #ddd"></button>
                                <button class="btn rounded-circle p-0" style="width:30px;height:30px;background:#FF6B35;border:2px solid #ddd"></button>
                                <button class="btn rounded-circle p-0" style="width:30px;height:30px;background:#004E89;border:2px solid #ddd"></button>
                                <button class="btn rounded-circle p-0" style="width:30px;height:30px;background:#28a745;border:2px solid #ddd"></button>
                                <button class="btn rounded-circle p-0" style="width:30px;height:30px;background:#6f42c1;border:2px solid #ddd"></button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Products Grid -->
                <div class="col-lg-9">
                    <!-- Sort Bar -->
                    <div class="sort-bar d-flex justify-content-between align-items-center flex-wrap">
                        <p class="mb-0 text-muted">Showing 1-8 of 8 products</p>
                        <div class="d-flex align-items-center gap-3">
                            <select class="form-select form-select-sm" style="width:auto">
                                <option>Sort by: Featured</option>
                                <option>Price: Low to High</option>
                                <option>Price: High to Low</option>
                                <option>Newest First</option>
                                <option>Best Rating</option>
                            </select>
                            <div class="btn-group btn-group-sm">
                                <button class="btn btn-outline-secondary active"><i class="fas fa-th"></i></button>
                                <button class="btn btn-outline-secondary"><i class="fas fa-list"></i></button>
                            </div>
                        </div>
                    </div>

                    <!-- Products Grid -->
                    <div class="row" id="all-products">
                        <!-- Products rendered by JS -->
                    </div>

                    <!-- Pagination -->
                    <nav class="mt-4">
                        <ul class="pagination justify-content-center">
                            <li class="page-item disabled"><a class="page-link" href="#"><i class="fas fa-chevron-left"></i></a></li>
                            <li class="page-item active"><a class="page-link" href="#">1</a></li>
                            <li class="page-item"><a class="page-link" href="#">2</a></li>
                            <li class="page-item"><a class="page-link" href="#">3</a></li>
                            <li class="page-item"><a class="page-link" href="#"><i class="fas fa-chevron-right"></i></a></li>
                        </ul>
                    </nav>
                </div>
            </div>
        </div>
    </section>
    <!-- Footer -->
    <div id="footer-placeholder"></div>

    <!-- Back to Top -->
    <button class="back-to-top"><i class="fas fa-chevron-up"></i></button>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
    <script>
        // Price range slider
        const priceRange = document.getElementById('priceRange');
        const priceValue = document.getElementById('priceValue');
        if (priceRange) {
            priceRange.addEventListener('input', () => {
                priceValue.textContent = '$' + priceRange.value;
            });
        }
    </script>
</body>
</html>
